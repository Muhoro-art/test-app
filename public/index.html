<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>test-app · Users</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">◈</span>
        <h1>test-app</h1>
      </div>
      <span class="status" id="status">connecting…</span>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>Add user</h2>
          <p class="muted">Create a new record via <code>POST /api/users</code></p>
        </div>
        <form id="user-form" class="form">
          <label>
            ID
            <input name="id" required placeholder="u-001" autocomplete="off" />
          </label>
          <label>
            Name
            <input name="name" required placeholder="Ada Lovelace" autocomplete="off" />
          </label>
          <label>
            Email
            <input name="email" type="email" required placeholder="ada@example.com" autocomplete="off" />
          </label>
          <label>
            Role
            <select name="role">
              <option value="member">member</option>
              <option value="admin">admin</option>
              <option value="viewer">viewer</option>
            </select>
          </label>
          <button type="submit" class="btn primary">Create user</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Users</h2>
          <button id="refresh" class="btn ghost" type="button">Refresh</button>
        </div>
        <div class="table-wrap">
          <table id="users-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="users-body">
              <tr class="empty"><td colspan="5">No users yet — create one to get started.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/app.js"></script>
  </body>
</html>
